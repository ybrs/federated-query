# Fact table (access_logs) in ClickHouse; dimensions (files, categories) in PostgreSQL.
# The fair baseline: neither engine gets the fact table "for free".
datasources:
  pg:
    type: postgresql
    driver: adbc
    host: localhost
    port: 5432
    database: duckpoc
    user: postgres
    password: ''
    schemas: [public]
    capabilities: [aggregations, joins, window_functions, subqueries, cte]
  ch:
    type: clickhouse
    host: 127.0.0.1
    port: 8123
    user: default
    password: ''
    database: default
    capabilities: [aggregations, joins, window_functions, subqueries, cte]
optimizer:
  enable_predicate_pushdown: true
  enable_projection_pushdown: true
  enable_join_reordering: true
  enable_decorrelation: true
executor:
  max_memory_mb: 2048
  batch_size: 10000
